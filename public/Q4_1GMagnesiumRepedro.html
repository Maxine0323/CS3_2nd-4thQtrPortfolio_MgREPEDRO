<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List - CRUD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 450px;
        }
        h2 { text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .stars { font-size: 24px; cursor: pointer; color: #ccc; }
        .stars span.selected { color: #ffcc00; }
        button#addBtn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .movie-entry {
            background: #fafafa;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            border: 1px solid #eee;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .gold { color: #ffcc00; }
        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add / Update a Movie Rating</h2>
    <div class="input-group">
        <label>Title:</label>
        <input type="text" id="title">
    </div>
    <div class="input-group">
        <label>Year:</label>
        <input type="text" id="year">
    </div>
    <div class="input-group">
        <label>Genre:</label>
        <select id="genre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
        </select>
    </div>
    <div class="input-group">
        <label>Rating:</label>
        <div class="stars" id="starContainer">
            <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
    </div>
    <button id="addBtn" onclick="processMovie()">Add Movie</button>

    <hr>
    <h2>Movie List</h2>
    <div id="list"></div>
</div>

<script>
    let selectedRating = 0;
    const starSpans = document.querySelectorAll('#starContainer span');

    starSpans.forEach(s => {
        s.onclick = () => {
            selectedRating = parseInt(s.dataset.v);
            updateStarUI(selectedRating);
        };
    });

    function updateStarUI(val) {
        starSpans.forEach(el => {
            el.classList.toggle('selected', parseInt(el.dataset.v) <= val);
        });
    }

    function processMovie() {
        const titleInput = document.getElementById('title');
        const yearInput = document.getElementById('year');
        const genreInput = document.getElementById('genre');
        
        const title = titleInput.value.trim();
        const year = yearInput.value.trim();
        const genre = genreInput.value;

        if (!title || !year || selectedRating === 0) {
            alert("Please fill all fields and select a rating.");
            return;
        }

        let movies = JSON.parse(localStorage.getItem('movies') || '[]');
        const existingIndex = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

        if (existingIndex > -1) {
            const oldRating = parseFloat(movies[existingIndex].rating);
            const newAvg = (oldRating + selectedRating) / 2;
            movies[existingIndex].year = year;
            movies[existingIndex].genre = genre;
            movies[existingIndex].rating = newAvg;
        } else {
            movies.push({ 
                title: title, 
                year: year, 
                genre: genre, 
                rating: selectedRating 
            });
        }

        localStorage.setItem('movies', JSON.stringify(movies));
        resetForm();
        render();
    }

    function deleteMovie(index) {
        if (confirm("Are you sure you want to delete this movie?")) {
            let movies = JSON.parse(localStorage.getItem('movies') || '[]');
            movies.splice(index, 1);
            localStorage.setItem('movies', JSON.stringify(movies));
            render();
        }
    }

    function resetForm() {
        document.getElementById('title').value = '';
        document.getElementById('year').value = '';
        selectedRating = 0;
        updateStarUI(0);
    }

    function render() {
        const container = document.getElementById('list');
        const movies = JSON.parse(localStorage.getItem('movies') || '[]');
        
        container.innerHTML = '';
        
        movies.forEach((m, i) => {
            const movieDiv = document.createElement('div');
            movieDiv.className = 'movie-entry';
            
            const roundedRating = Math.round(m.rating);
            const starsDisplay = '★'.repeat(roundedRating) + '☆'.repeat(5 - roundedRating);
            
            movieDiv.innerHTML = `
                <div>
                    <strong>${m.title} (${m.year})</strong> - ${m.genre}, 
                    Rating: <span class="gold">${starsDisplay}</span>
                </div>
                <button class="delete-btn" onclick="deleteMovie(${i})">Delete</button>
            `;
            container.appendChild(movieDiv);
        });
    }

    window.onload = render;
</script>

</body>
</html>
